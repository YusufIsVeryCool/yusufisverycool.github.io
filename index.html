    <!-- JavaScript for Key Gate Logic -->
    <script>
        const VALID_KEY = "kafir"; // <--- KEY HAS BEEN CHANGED TO "kafir"
        const keyInput = document.getElementById('secret-key-input');
        const keyGate = document.getElementById('key-gate');
        const mainContentWrapper = document.getElementById('main-content-wrapper');
        const errorMessage = document.getElementById('error-message');

        keyInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                checkKey();
            }
        });

        /**
         * Checks the entered key against the VALID_KEY constant.
         * If valid, hides the gate and shows the content.
         */
        function checkKey() {
            const enteredKey = keyInput.value.trim();

            if (enteredKey === VALID_KEY) {
                // Key is valid: Hide the gate and show the main content
                keyGate.style.opacity = '0'; // Start transition
                
                setTimeout(() => {
                    keyGate.classList.add('hidden'); // Hide key gate
                    keyGate.remove(); // Remove from DOM after hidden (optional cleanup)

                    // Show content wrapper and fade it in
                    mainContentWrapper.classList.remove('hidden');
                    mainContentWrapper.style.opacity = '1';

                    // Remove the gate-active class to re-enable scrolling and full layout
                    document.body.classList.remove('gate-active');

                }, 500); // Wait for the 0.5s transition

                errorMessage.classList.add('hidden');
            } else {
                // Key is invalid: Show error message
                errorMessage.textContent = 'Invalid key. Access denied.';
                errorMessage.classList.remove('hidden');

                // Visual feedback: brief red border
                keyInput.classList.add('border-red-500');

                // Remove the red border and clear input after a short delay
                setTimeout(() => {
                    keyInput.classList.remove('border-red-500');
                    keyInput.value = ''; 
                }, 750);
            }
        }
    </script>
